<ion-content [fullscreen]="true" class="login-content">
  <!-- Fondo con efecto de gradiente animado -->
  <div class="login-bg">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
  </div>

  <div class="login-container">
    <!-- =========================
         BRAND SECTION
    ========================= -->
    <div class="brand-section">
      <div class="logo-wrapper">
        <img
          class="logo"
          src="assets/logo/logo_ferreteria.png"
          alt="Ferretería July"
        />
        <div class="logo-glow"></div>
      </div>
      <h1 class="brand-name">Ferretería July</h1>
      <p class="brand-tagline">Sistema Corporativo</p>
    </div>

    <!-- =========================
         LOGIN CARD
    ========================= -->
    <ion-card class="login-card">
      <ion-card-content>
        <!-- HEADER -->
        <div class="card-header">
          <h2>Bienvenido</h2>
          <p>Inicia sesión para acceder al sistema</p>
        </div>

        <!-- =========================
             FORM
        ========================= -->
        <form [formGroup]="form" (ngSubmit)="submitLogin()" class="login-form">
          <!-- =========================
               USERNAME / EMAIL
          ========================= -->
          <div class="input-group">
            <ion-item
              class="form-item"
              lines="none"
              [class.invalid]="f.identifier.touched && f.identifier.invalid"
            >
              <ion-icon
                name="person-outline"
                slot="start"
                class="input-icon"
              ></ion-icon>
              <ion-input
                formControlName="identifier"
                type="text"
                placeholder="Usuario o correo electrónico"
                autocomplete="username"
              ></ion-input>
            </ion-item>
            <div
              class="field-error"
              *ngIf="f.identifier.touched && f.identifier.invalid"
            >
              <span *ngIf="f.identifier.errors?.['required']">
                El usuario o correo es obligatorio
              </span>
              <span *ngIf="f.identifier.errors?.['minlength']">
                Mínimo 3 caracteres
              </span>
            </div>
          </div>

          <!-- =========================
               PASSWORD
          ========================= -->
          <div class="input-group">
            <ion-item
              class="form-item"
              lines="none"
              [class.invalid]="f.password.touched && f.password.invalid"
            >
              <ion-icon
                name="lock-closed-outline"
                slot="start"
                class="input-icon"
              ></ion-icon>
              <ion-input
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                placeholder="Contraseña"
                autocomplete="current-password"
              ></ion-input>
              <ion-button
                fill="clear"
                slot="end"
                type="button"
                class="toggle-password"
                (click)="togglePassword()"
              >
                <ion-icon
                  class="eye-icon"
                  [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
                ></ion-icon>
              </ion-button>
            </ion-item>
            <div
              class="field-error"
              *ngIf="f.password.touched && f.password.invalid"
            >
              <span *ngIf="f.password.errors?.['required']">
                La contraseña es obligatoria
              </span>
              <span *ngIf="f.password.errors?.['minlength']">
                Mínimo 6 caracteres
              </span>
            </div>
          </div>

          <!-- =========================
               OPTIONS
          ========================= -->
          <div class="options-row">
            <ion-item lines="none" class="remember-item">
              <ion-checkbox formControlName="remember"></ion-checkbox>
              <ion-label>Recordarme</ion-label>
            </ion-item>
          </div>

          <!-- =========================
               API ERROR
          ========================= -->
          <ion-text color="danger" *ngIf="apiError">
            <p class="api-error">{{ apiError }}</p>
          </ion-text>

          <!-- =========================
               SUBMIT BUTTON
          ========================= -->
          <ion-button
            expand="block"
            type="submit"
            class="login-button"
            [disabled]="form.invalid || submitting"
          >
            <ion-spinner *ngIf="submitting" name="crescent"></ion-spinner>
            <span *ngIf="!submitting">Iniciar sesión</span>
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>

    <!-- Footer -->
    <p class="footer-text">
      © 2026 Ferretería July. Todos los derechos reservados.
    </p>
  </div>
</ion-content>
