<!-- Botón flotante animado -->
<ion-fab
  *ngIf="!isOpen"
  slot="fixed"
  vertical="bottom"
  horizontal="end"
  edge
  class="chat-fab"
>
  <ion-fab-button (click)="openChat()" class="chat-fab-button">
    <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
  </ion-fab-button>
</ion-fab>

<!-- Modal del chat -->
<ion-modal
  [isOpen]="isOpen"
  [breakpoints]="[0, 0.5, 0.9, 1]"
  [initialBreakpoint]="0.9"
  [handle]="true"
  (didDismiss)="onModalDismiss()"
  class="chat-modal"
>
  <ng-template>
    <ion-header class="chat-header">
      <ion-toolbar>
        <ion-title>
          <ion-icon
            name="chatbubble-ellipses-outline"
            class="header-icon"
          ></ion-icon>
          Asistente Ferretería
        </ion-title>
        <ion-button slot="end" fill="clear" (click)="closeChat()">
          <ion-icon name="close-outline"></ion-icon>
        </ion-button>
      </ion-toolbar>
    </ion-header>

    <ion-content class="chat-content" #chatContent>
      <div class="messages-container">
        <div
          *ngFor="let msg of messages; let i = index"
          [class.user]="msg.isUser"
          [class.bot]="!msg.isUser"
          class="message animate-message"
          [style.animationDelay]="i * 0.03 + 's'"
        >
          <div class="bubble">
            <div class="message-header" *ngIf="!msg.isUser">
              <ion-icon name="logo-electron" class="bot-icon"></ion-icon>
              <span class="bot-name">Asistente</span>
            </div>
            <p [innerHTML]="msg.text"></p>
            <!-- Gráfico -->
            <canvas
              *ngIf="msg.chartData"
              [id]="'chart-' + i"
              width="400"
              height="200"
              style="max-width: 100%; margin-top: 8px"
            ></canvas>
            <!-- Sugerencias rápidas -->
            <div *ngIf="msg.suggestions" class="suggestions-row">
              <ion-chip
                *ngFor="let sug of msg.suggestions"
                (click)="onSuggestionClick(sug)"
                color="primary"
              >
                <ion-icon name="flash-outline"></ion-icon>
                <ion-label>{{ sug }}</ion-label>
              </ion-chip>
            </div>
            <div class="message-footer">
              <span class="timestamp">{{
                msg.timestamp | date: "shortTime"
              }}</span>
              <div *ngIf="msg.actions" class="action-buttons">
                <ion-button
                  fill="clear"
                  size="small"
                  (click)="downloadPdf(msg.saleData)"
                >
                  <ion-icon name="document-text-outline"></ion-icon> PDF
                </ion-button>
                <ion-button
                  fill="clear"
                  size="small"
                  (click)="downloadImage(msg.saleData)"
                >
                  <ion-icon name="image-outline"></ion-icon> Imagen
                </ion-button>
              </div>
            </div>
          </div>
        </div>
        <div *ngIf="isTyping" class="message bot typing-indicator">
          <div class="bubble">
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </div>
    </ion-content>

    <ion-footer class="chat-footer">
      <ion-toolbar>
        <ion-input
          #messageInput
          placeholder="Escribe tu consulta aquí..."
          [(ngModel)]="newMessage"
          (keyup.enter)="sendMessage()"
          [disabled]="isLoading"
        ></ion-input>
        <ion-button
          slot="end"
          fill="clear"
          (click)="onSuggestionClick('sugerencias')"
          title="Sugerencias"
        >
          <ion-icon name="flash-outline"></ion-icon>
        </ion-button>
        <ion-button
          slot="end"
          fill="clear"
          (click)="sendMessage()"
          [disabled]="!newMessage.trim() || isLoading"
          class="send-button"
        >
          <ion-icon name="send-outline"></ion-icon>
        </ion-button>
      </ion-toolbar>
    </ion-footer>
  </ng-template>
</ion-modal>
