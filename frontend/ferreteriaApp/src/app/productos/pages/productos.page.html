<ion-content [fullscreen]="true" class="products-content">
  <div class="products-shell">
    <!-- HERO (FIX TOPBAR OVERLAP SAFE) -->
    <section class="hero-section">
      <div class="hero-info">
        <h1>Productos</h1>
        <p>Gestión completa del catálogo e inventario de productos.</p>
      </div>
    </section>

    <!-- TOOLBAR -->
    <section class="toolbar-section">
      <div class="search-box">
        <ion-icon name="search-outline" class="search-icon"></ion-icon>

        <input
          type="text"
          placeholder="Buscar producto..."
          (input)="onSearch($event)"
        />
      </div>

      <ion-button fill="solid" class="filter-btn" (click)="openFilters()">
        <ion-icon slot="icon-only" name="filter-outline"></ion-icon>
      </ion-button>

      <!-- BOTÓN RESPONSIVE AGREGAR -->
      <ion-button class="add-btn" (click)="addProduct()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Agregar
      </ion-button>
    </section>

    <!-- SEGMENT -->
    <section class="segment-wrapper">
      <ion-segment
        mode="md"
        [value]="selectedFilter()"
        (ionChange)="onFilterChange($event.detail.value)"
      >
        <ion-segment-button value="all">
          <ion-label>Todos</ion-label>
        </ion-segment-button>

        <ion-segment-button value="active">
          <ion-label>Activos</ion-label>
        </ion-segment-button>

        <ion-segment-button value="inactive">
          <ion-label>Inactivos</ion-label>
        </ion-segment-button>
      </ion-segment>
    </section>

    <!-- LISTA -->
    <section class="products-list">
      <ng-container *ngIf="filteredProducts.length > 0; else emptyState">
        <div class="product-card" *ngFor="let producto of filteredProducts">
          <div class="product-image">
            <img [src]="producto.imagenUrl" [alt]="producto.nombre" />
          </div>

          <div class="product-info">
            <h3>{{ producto.nombre }}</h3>

            <span class="sku">SKU: {{ producto.sku }}</span>

            <div class="meta-row">
              <div
                class="stock-badge"
                [ngClass]="getStockClass(producto.stock)"
              >
                Stock: {{ producto.stock }}
              </div>

              <div class="price">S/ {{ producto.precio | number:'1.2-2' }}</div>
            </div>
          </div>

          <div class="actions">
            <ion-button
              fill="clear"
              class="edit-btn"
              (click)="editProduct(producto)"
            >
              <ion-icon name="create-outline"></ion-icon>
            </ion-button>
          </div>
        </div>
      </ng-container>

      <!-- EMPTY STATE REAL -->
      <ng-template #emptyState>
        <div class="empty-state">
          <ion-icon name="cube-outline"></ion-icon>
          <p>No hay productos disponibles</p>
        </div>
      </ng-template>
    </section>
  </div>
</ion-content>
