<ion-header class="dashboard-header">
  <ion-toolbar>
    <div class="toolbar-container">
      <div class="toolbar-left">
        <ion-button
          fill="clear"
          class="toolbar-icon-btn menu-btn"
          (click)="onMenuClick()"
        >
          <ion-icon name="menu-outline"></ion-icon>
        </ion-button>
        <div class="brand-wrapper">
          <div class="brand-badge"><div class="brand-dot"></div></div>
          <div class="toolbar-text">
            <h1>{{ title }}</h1>
            <p>{{ subtitle }}</p>
          </div>
        </div>
      </div>

      <div class="toolbar-right">
        <ion-button
          fill="clear"
          class="toolbar-icon-btn notification-btn"
          (click)="onNotificationClick()"
        >
          <ion-icon name="notifications-outline"></ion-icon>
          <div class="notification-dot"></div>
        </ion-button>

        <ion-button
          fill="clear"
          class="user-chip"
          (click)="openUserMenu($event)"
          *ngIf="user"
        >
          <ion-avatar class="user-avatar" slot="start">
            <img *ngIf="user.imageUrl" [src]="user.imageUrl" />
            <span *ngIf="!user.imageUrl">{{ userInitials }}</span>
          </ion-avatar>
          <div class="user-meta">
            <span class="user-name">{{ user.fullName }}</span>
            <span class="user-role">{{ user.role }}</span>
          </div>
        </ion-button>
        <ion-popover alignment="end">
          <ng-template>
            <ion-content>
              <ion-list>
                <ion-item button (click)="openProfile()">
                  <ion-icon slot="start" name="person-outline"></ion-icon>
                  <ion-label>Perfil</ion-label>
                </ion-item>
                <ion-item button (click)="openSettings()">
                  <ion-icon slot="start" name="settings-outline"></ion-icon>
                  <ion-label>Configuración</ion-label>
                </ion-item>
                <ion-item button (click)="logout()">
                  <ion-icon slot="start" name="log-out-outline"></ion-icon>
                  <ion-label>Cerrar sesión</ion-label>
                </ion-item>
              </ion-list>
            </ion-content>
          </ng-template>
        </ion-popover>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<!-- Modales (se declaran aquí para que estén disponibles en el template) -->
<app-notifications-modal></app-notifications-modal>
<app-profile-modal></app-profile-modal>
<app-settings-modal></app-settings-modal>
