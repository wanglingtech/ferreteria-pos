<ion-modal
  [isOpen]="isOpen"
  (didDismiss)="close()"
  [initialBreakpoint]="0.7"
  [breakpoints]="[0, 0.5, 0.7]"
>
  <ng-template>
    <ion-header class="modal-header">
      <ion-toolbar class="modal-toolbar">
        <ion-title>Mi Perfil</ion-title>
        <ion-button slot="end" fill="clear" (click)="close()">
          <ion-icon name="close-outline"></ion-icon>
        </ion-button>
      </ion-toolbar>
    </ion-header>
    <ion-content class="modal-content">
      <form [formGroup]="profileForm" (ngSubmit)="save()">
        <div class="avatar-container">
          <ion-avatar class="profile-avatar">
            <img [src]="previewImage || 'assets/default-avatar.png'" />
          </ion-avatar>
        </div>
        <ion-item>
          <ion-label position="floating">Nombre completo</ion-label>
          <ion-input formControlName="fullName"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">Correo electrónico</ion-label>
          <ion-input formControlName="email" type="email"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">URL de imagen (avatar)</ion-label>
          <ion-input
            formControlName="imageUrl"
            (ionInput)="onImageUrlChange()"
            placeholder="https://..."
          ></ion-input>
        </ion-item>
        <div class="form-actions">
          <ion-button
            expand="block"
            type="submit"
            [disabled]="profileForm.invalid"
          >
            <ion-icon slot="start" name="save-outline"></ion-icon>
            Guardar cambios
          </ion-button>
        </div>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>
