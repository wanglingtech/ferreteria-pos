<ion-menu contentId="main-content" menuId="app-sidebar" side="start" type="overlay">
  <app-siderbar (navigate)="closeSidebar()"></app-siderbar>
</ion-menu>

<app-header
  [title]="pageTitle"
  [subtitle]="pageSubtitle"
  [user]="user"

</app-header>

<ion-router-outlet id="main-content"></ion-router-outlet>

<app-footer></app-footer>
